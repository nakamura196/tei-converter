<!DOCTYPE html>
<html lang="ja">
<head>

<meta name="keywords" content="TEI, XML, ビューワ, CETEIcean, 可視化, デジタルヒューマニティーズ">
<link rel="canonical" href="https://toyo-bunko.github.io/tei-tools/viewer.html">
<!-- OGP -->
<meta property="og:title" content="TEI/XML ビューワ — TEI Tools">
<meta property="og:description" content="TEI/XML ファイルをブラウザ上で可視化・確認するツール。">

<meta property="og:url" content="https://toyo-bunko.github.io/tei-tools/viewer.html">

<meta property="og:locale" content="ja_JP">
<meta property="og:image" content="https://toyo-bunko.github.io/tei-tools/og-image.png">

<meta property="og:image:height" content="630">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://toyo-bunko.github.io/tei-tools/og-image.png">
<meta name="twitter:image:alt" content="TEI Tools — TEI/XML のための変換・可視化ツール">
<meta name="twitter:title" content="TEI/XML ビューワ — TEI Tools">
<meta name="twitter:description" content="TEI/XML ファイルをブラウザ上で可視化・確認するツール。">
<link rel="icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/CETEIcean@1.9.5/dist/CETEI.js"></script>
</head>
<body>

<!-- GitHub link · site header · footer: injected by js/shared/common.js → renderChrome() -->

<h1 class="page-title" data-i18n="modeViewer">TEI/XML ビューワ</h1>
<p class="subtitle" data-i18n="viewerSubtitle">TEI/XML ファイルを可視化して確認</p>

<div class="note-box" data-i18n="viewerNote">
  このビューワは、<a href="https://teigarage.tei-c.org/" target="_blank" rel="noopener">TEI Garage</a> によって生成される TEI/XML を想定しています。TEI/XML のタグ体系はプロジェクトごとに異なるため、すべての TEI/XML ファイルの表示に対応しているわけではありません。
</div>

<div class="main-content">

  <div class="dropzone" id="xmlDropzone">
    <div class="dropzone-icon">📝</div>
    <div class="dropzone-text">
      <strong data-i18n="xmlDropMain">TEI/XML ファイルをドラッグ&ドロップ</strong><br>
      <span data-i18n="xmlDropSub">またはクリックして選択</span>
    </div>
    <div class="file-name" id="xmlFileName"></div>
    <input type="file" class="file-input" id="xmlFileInput" accept=".xml,.tei,text/xml,application/xml">
  </div>

  <div style="display:flex;justify-content:center;gap:1.5rem">
    <button class="sample-link" id="sampleXmlBtn" data-i18n="sampleXml">サンプル TEI/XML で試す</button>
  </div>

  <div class="error" id="error"></div>

  <div class="result" id="result">
    <div class="result-header">
      <h2 data-i18n="viewerTitle">TEI/XML ビューワ</h2>
      <div class="result-actions">
        <button class="btn-secondary" id="copyBtn" data-i18n="copy">XML をコピー</button>
        <button class="btn-primary" id="downloadBtn" data-i18n="download">ダウンロード</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn" data-tab="panelXml" data-i18n="tabXml">XML</button>
      <button class="tab-btn active" data-tab="panelPreview" data-i18n="tabPreview">プレビュー</button>
    </div>
    <div class="tab-panel" id="panelXml">
      <div class="xml-preview" id="xmlPreview"></div>
    </div>
    <div class="tab-panel active" id="panelPreview">
      <div class="tei-preview" id="teiPreview"></div>
    </div>
  </div>

</div>

<script src="js/shared/common.js"></script>
<script src="js/pages/viewer.js"></script>
</body>
</html>
